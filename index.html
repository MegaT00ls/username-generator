<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  /* Global */
  * { box-sizing: border-box; margin:0; padding:0; font-family: 'Montserrat', sans-serif; }
  body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 50px 10px;
  }

  /* Container */
  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 50px;
    max-width: 750px;
    width: 100%;
    box-shadow: 0 25px 70px rgba(0,0,0,0.6);
    animation: fadeIn 1s ease forwards;
    border: 1px solid rgba(255,255,255,0.2);
  }

  @keyframes fadeIn {
    0% {opacity: 0; transform: translateY(-20px);}
    100% {opacity:1; transform: translateY(0);}
  }

  /* Header */
  h1 {
    font-size: 40px;
    margin-bottom: 10px;
    letter-spacing: 1.5px;
    text-shadow: 0 2px 10px rgba(34,197,94,0.8);
  }

  p {
    font-size: 16px;
    color: #94a3b8;
    margin-bottom: 35px;
  }

  /* Inputs & Dropdown */
  input, select, button {
    width: 100%;
    padding: 16px 20px;
    margin: 12px 0;
    border-radius: 15px;
    border: none;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
  }

  input {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }

  input:focus { background: rgba(255,255,255,0.15); }

  select {
    background: rgba(255,255,255,0.08);
    color: #000;
  }

  select option {
    color: #000;
    background: #fff;
  }

  select:focus { background: rgba(255,255,255,0.15); }

  /* Buttons */
  button {
    background: linear-gradient(90deg, #22c55e, #38bdf8);
    color: #000;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    border-radius: 15px;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }

  .copy-all {
    background: linear-gradient(90deg, #facc15, #f43f5e);
  }

  /* Results */
  .result {
    background: rgba(255,255,255,0.1);
    padding: 16px 22px;
    margin: 12px 0;
    border-radius: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
  }

  .result:hover {
    background: rgba(255,255,255,0.2);
    transform: translateX(3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }

  .copy-btn {
    background: #6366f1;
    color: white;
    padding: 8px 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
  }

  .copy-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
  }

  /* Monetization Sections */
  .monetize {
    margin-top: 35px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    text-align: center;
  }

  .monetize a {
    color: #38bdf8;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
  }

  .monetize a:hover { text-decoration: underline; }

  .footer {
    margin-top: 30px;
    font-size: 14px;
    color: #94a3b8;
    text-align: center;
  }
</style>
</head>

<body>
<div class="container">
  <h1>🚀 Jaw-Dropping Username Generator</h1>
  <p>Discover aesthetic, gaming, cool & professional usernames instantly!</p>

  <input type="text" id="name" placeholder="Enter your name or keyword">

  <select id="style">
    <option value="cool">Cool 😎</option>
    <option value="aesthetic">Aesthetic 🌙</option>
    <option value="gaming">Gaming 🎮</option>
    <option value="business">Business 💼</option>
    <option value="random">Random 🌟</option>
  </select>

  <button onclick="generate()">Generate Usernames</button>
  <button class="copy-all" onclick="copyAll()">Copy All</button>

  <div id="output"></div>

  <!-- Affiliate / Donation Section -->
  <div class="monetize">
    <p>Support the tool or check out recommended services:</p>
    <a href="https://www.buymeacoffee.com/yourprofile" target="_blank">
      ☕ Buy Me a Coffee
    </a><br><br>
    <a href="https://www.namecheap.com/?affiliate=yourcode" target="_blank">
      🌐 Get Your Custom Domain
    </a><br><br>
    <!-- Placeholder Ad Slot -->
    <div style="margin-top:20px; background: rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 12px;">
      Your Ad Could Appear Here 🚀
    </div>
  </div>

  <div class="footer">© 2026 MegaTools • Made with ❤️ for creators</div>
</div>

<script>
function generate() {
  const name = document.getElementById("name").value || "user";
  const style = document.getElementById("style").value;
  const output = document.getElementById("output");

  let words = {
    cool: ["x","pro","king","vibe","zone","elite","flash","legend"],
    aesthetic: ["moon","cloud","soft","dream","mist","star","dusk","echo"],
    gaming: ["killer","sniper","ghost","legend","shadow","blade","strike","rage"],
    business: ["official","global","brand","hq","group","inc","ventures","team"],
    random: ["alpha","nova","prime","matrix","zen","pulse","cyber","neo"]
  };

  let list = [];
  for (let i = 0; i < 15; i++) {
    let w = words[style][Math.floor(Math.random() * words[style].length)];
    let num = Math.floor(Math.random() * 999);
    list.push(name + "_" + w + num);
  }

  output.innerHTML = "";

  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "result";
    div.innerHTML = `<span>${item}</span>
                     <button class="copy-btn" onclick="copyText('${item}')">Copy</button>`;
    output.appendChild(div);
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function copyAll() {
  const items = document.querySelectorAll(".result span");
  let text = "";
  items.forEach(i => text += i.innerText + "\n");
  navigator.clipboard.writeText(text);
  alert("All copied!");
}
</script>
</body>
</html>
